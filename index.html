<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Super Edits</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: white;
    margin: 0;
    text-align: center;
}

/* URGENCY BAR */
.top-bar {
    background: red;
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
}

/* HEADER */
header {
    padding: 20px;
    background: black;
}

h1 {
    color: #00ffcc;
}

/* PRODUCTS */
.products {
    padding: 40px 10%;
}

.card {
    background: #111;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 0 20px rgba(0,255,204,0.2);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    font-size: 24px;
    margin: 15px 0;
    color: #00ffcc;
}

/* SCARCITY */
.stock {
    color: #ff4d4d;
    font-weight: bold;
}

/* COUNTDOWN */
.timer {
    margin: 10px 0;
    font-size: 18px;
    color: orange;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 14px 25px;
    border-radius: 30px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-weight: bold;
    margin-top: 10px;
}

/* BUNDLE */
.bundle {
    margin-top: 40px;
    padding: 20px;
    border: 1px solid #00ffcc;
    border-radius: 15px;
}

/* POPUP */
#salesPopup {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #111;
    padding: 15px;
    border-radius: 10px;
    display: none;
}

/* ANIMATION */
.low {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% {opacity: 0.5;}
}
</style>
</head>

<body>

<div class="top-bar">
⚠️ LIMITED OFFER — DISCOUNT ENDS SOON
</div>

<header>
    <h1>Super Edits Products</h1>
</header>

<section class="products">

    <div class="card">
        <h2>Business Poster Template</h2>

        <img src="madiba_katlego_consultancy_poster.png">

        <p>High-quality editable design for business promotions.</p>

        <div class="price">R50</div>

        <div class="stock" id="stock">Only 17 copies left</div>

        <div class="timer" id="timer">Offer ends in: 10:00</div>

        <a class="btn"
        onclick="reduceStock()"
        href="https://wa.me/27665647535?text=I%20want%20to%20buy%20the%20Poster">
        Buy Now
        </a>
    </div>

    <!-- BUNDLE -->
    <div class="bundle">
        <h3>🔥 Bundle Deal</h3>
        <p>Get 3 Templates for only <b>R120</b></p>

        <a class="btn"
        href="https://wa.me/27665647535?text=I%20want%20the%20bundle%20deal">
        Get Bundle
        </a>
    </div>

</section>

<!-- POPUP -->
<div id="salesPopup"></div>

<script>
// STOCK
let stock = 17;
function reduceStock() {
    if (stock > 0) {
        stock--;
        let el = document.getElementById("stock");
        el.innerText = "Only " + stock + " copies left";

        if (stock <= 10) {
            el.classList.add("low");
        }
    }
}

// COUNTDOWN
let time = 600;
setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").innerText =
        "Offer ends in: " + min + ":" + (sec < 10 ? "0" + sec : sec);

    if (time > 0) time--;
}, 1000);

// FAKE LIVE SALES (REALISTIC STYLE)
const names = ["Thabo","Lerato","Sipho","Ayesha","Kabelo"];
const cities = ["Johannesburg","Cape Town","Durban","Pretoria"];

setInterval(() => {
    const name = names[Math.floor(Math.random()*names.length)];
    const city = cities[Math.floor(Math.random()*cities.length)];

    let popup = document.getElementById("salesPopup");
    popup.innerText = name + " from " + city + " just bought this 🔥";
    popup.style.display = "block";

    setTimeout(() => {
        popup.style.display = "none";
    }, 3000);

}, Math.random() * 5000 + 5000);
</script>

</body>
</html>
